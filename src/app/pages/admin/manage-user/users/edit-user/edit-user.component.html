<div  >

  <div class="NewHeader">
    <h1   mat-dialog-title>
      <span *ngIf="!data">Add</span><span *ngIf="data">Edit</span> User
    </h1>
  </div>

  <div mat-dialog-content style="padding: 20px;">
    <form class="form-horizontal" [formGroup]="myGroup" autocomplete="off">

      <div class="row align-items-center mb-3">
        <label class="col-sm-4 control-label text-end fw-bold">User Name: <span class="text-danger">*</span></label>
        <div class="col-sm-8">
          <input type="text" formControlName="userName" class="form-control" placeholder="Enter User Name">
          <small class="text-danger"
            *ngIf="myGroup.get('userName')?.hasError('required') && myGroup.get('userName')?.touched">
            User Name is required
          </small>
        </div>
      </div>

      <div class="row align-items-center mb-3">
        <label class="col-sm-4 control-label text-end fw-bold">Email: <span class="text-danger">*</span></label>
        <div class="col-sm-8">
          <input type="email" formControlName="email" class="form-control" placeholder="Enter Email"
            [attr.disabled]="data ? true : null">
          <small class="text-danger"
            *ngIf="myGroup.get('email')?.hasError('required') && myGroup.get('email')?.touched">
            Email is required
          </small>
        </div>
      </div>

      <div class="row align-items-center mb-3">
        <label class="col-sm-4 control-label text-end fw-bold">Phone Number: <span class="text-danger">*</span></label>
        <div class="col-sm-8">
          <input type="text" formControlName="phoneNumber" class="form-control" placeholder="Enter Phone No"
            (keypress)="onlyNumbers($event)" maxlength="10">
        </div>
      </div>

      <div class="row align-items-center mb-3">
        <label class="col-sm-4 control-label text-end fw-bold">Role: <span class="text-danger">*</span></label>
        <div class="col-sm-8">
          <mat-select formControlName="roleId" class="form-control" placeholder="Select Role">
            <mat-option *ngFor="let role of roles" [value]="role.roleId">{{role.roleName}}</mat-option>
          </mat-select>
        </div>
      </div>

      <div class="row align-items-center mb-3">
        <label class="col-sm-4 control-label text-end fw-bold">Department: </label>
        <div class="col-sm-8">
          <input type="text" formControlName="department" class="form-control" placeholder="Enter Department">
        </div>
      </div>

      <!-- <div class="row align-items-center mb-3">
        <label class="col-sm-4 control-label text-end fw-bold">Manager: </label>
        <div class="col-sm-8">
          <input type="text" formControlName="manager" class="form-control" placeholder="Enter Manager Name">
        </div>
      </div> -->

      <div class="row align-items-center mb-3">
        <label class="col-sm-4 control-label text-end fw-bold">Manager: </label>
        <div class="col-sm-8">
          <mat-select formControlName="manager" class="form-control" placeholder="Select Managers" multiple>
            <mat-option *ngFor="let mgr of managerList" [value]="mgr.userId">{{mgr.userName}}</mat-option>
          </mat-select>
        </div>
      </div>

      <div class="row mt-4">
        <div class="col-sm-4 offset-sm-2">
          <mat-checkbox formControlName="isHod">HOD</mat-checkbox>
        </div>
        <div class="col-sm-4">
          <mat-checkbox formControlName="isInspector">Inspector</mat-checkbox>
        </div>
        <div class="col-sm-4 offset-sm-2 mt-2">
          <mat-checkbox formControlName="isAuditor">Auditor</mat-checkbox>
        </div>
        <div class="col-sm-6 mt-2">
          <mat-checkbox formControlName="isManagerialRole">Managerial Role</mat-checkbox>
        </div>
      </div>

    </form>
  </div>

  <mat-dialog-actions align="end" style="padding: 15px;">
    <button mat-raised-button style="background-color: lightgray; color: red;" (click)="close()">
      <mat-icon>cancel</mat-icon> Close
    </button>
    <button mat-raised-button color="primary" class="ms-2" [disabled]="!myGroup.valid" (click)="upsertuser()">
      <mat-icon>save</mat-icon> Save
    </button>
  </mat-dialog-actions>

</div>
