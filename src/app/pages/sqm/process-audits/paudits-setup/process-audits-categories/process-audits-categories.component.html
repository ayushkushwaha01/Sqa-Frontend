<div class="custom-layout-wrapper">

  <div style="display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 15px;">
    <button mat-raised-button
      style="background-color: #1a1a1a; color: white; padding: 0 16px; height: 40px; border: none; border-radius: 4px; display: flex; align-items: center; gap: 6px; font-weight: 500; cursor: pointer;"
      (click)="showFilters = !showFilters">
      <mat-icon class="mt-1" style="font-size: 18px; height: 18px; width: 18px;">filter_list</mat-icon>
      Filter
    </button>

    <button mat-raised-button
      style="background-color: #2196f3; color: white; padding: 0 16px; height: 40px; border: none; border-radius: 4px; display: flex; align-items: center; gap: 6px; font-weight: 500; cursor: pointer;"
      (click)="addCategory(null)">
      <mat-icon class="mt-1" style="font-size: 18px; height: 18px; width: 18px;">add</mat-icon>
      Add Process Category
    </button>
  </div>

  <div class="row" *ngIf="showFilters" style="margin-left: 5px; margin-bottom: 15px;">
    <div class="col-sm-12 flex-p w-100">
      <mat-card class="filter" style="box-shadow: 5px 2px 1px -1px rgba(0, 0, 0, 0.2), 0px 5px 1px 0px rgba(0, 0, 0, 0.14), 0px 1px 5px 1px rgba(0, 0, 0, 0.12) !important;">
        <mat-card-content>
          <div class="row col-sm-12" style="align-items: center;">
            <div class="col-sm-4 row me-2" style="align-items: center;">
              <div class="col-sm-3 newMarginClass"><b>Keyword:</b></div>
              <div class="col-sm-9">
                <input type="text" [(ngModel)]="selectedCategory" class="form-control"
                  placeholder="Search by Name, Code...">
              </div>
            </div>
            <div class="col-sm-4 row" style="align-items: center;">
              <div class="col-sm-3 newMarginClass"><b>Status:</b></div>
              <div class="col-sm-8">
                <mat-select placeholder="Select Status" class="form-control" [(ngModel)]="selectedStatus">
                  <mat-option value="Active">Active</mat-option>
                  <mat-option value="Inactive">Inactive</mat-option>
                </mat-select>
              </div>
            </div>
            <div class="col-sm-4 mt-2" style="margin-left: -25px;">
              <button mat-raised-button class="pull-right btn-default margin-right-10"
                (click)="onClear()">
                <mat-icon>settings_backup_restore</mat-icon> Clear
              </button>
              <button mat-raised-button color="primary" class="pull-right margin-right-10"
                (click)="onSearch()">
                <mat-icon>search</mat-icon> Search
              </button>
            </div>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </div>

  <div class="table-responsive bg-white shadow-sm">
    <table class="custom-grid-table">
      <thead>
        <tr>
          <th>Process Category Name</th>
          <th style="width: 130px;">Category Code</th>
          <th class="text-center">Checklist </th>
          <th class="text-center" style="width: 150px;">Status</th>
          <th class="text-center" style="width: 150px;">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of tableData">
          <td>{{ item.name }}</td>
          <td class="text-center">{{ item.code }}</td>
          <td class="text-center"> 
            <!-- 🔥 Data bound to item.processCategoryId and item.checklistCount -->
            <a [routerLink]="['inner']" class="text-blue" [queryParams]="{ id: item.processCategoryId }"
              style=" cursor: pointer;" matTooltip="View Details">
              {{ item.checklistCount }}
            </a>
          </td>
          <td class="text-center">
            <a class="status-link" [ngClass]="item.isActive ? 'text-blue' : 'text-red'"
              matTooltip="Click to Change Status" style="cursor: pointer;" (click)="toggleStatus(item)">
              {{ item.isActive ? 'Active' : 'Inactive' }}
            </a>
          </td>
         <td class="text-center manage-icons">
            <i class="fa fa-edit text-primary" matTooltip="Edit" (click)="addCategory(item)" style="cursor: pointer; margin-right: 10px;"></i>
            <i class="fa fa-trash text-danger" matTooltip="Delete" style="cursor: pointer;" (click)="deleteCategory(item)"></i>
          </td>
        </tr>
        <tr *ngIf="tableData.length === 0">
          <td colspan="5" class="text-center text-muted" style="padding: 15px;">No Categories Found</td>
        </tr>
      </tbody>
    </table>
  </div>

  <mat-paginator [length]="tableData.length" [pageSize]="4" [pageSizeOptions]="[4, 10, 25, 50]" showFirstLastButtons></mat-paginator>
</div>
