<div class="NewHeader">
    <h3>
       {{ isEditMode ? 'Update Question' : 'Add Question' }}
    </h3>
 </div>
 
 <div mat-dialog-content style="padding: 20px;">
    <!-- Wrap inputs in the form group -->
    <form [formGroup]="questionForm">
        <div class="row mb-3 align-items-center">
            <div class="col-sm-3 fw-bold text-end">Question: <span class="text-danger">*</span></div>
            <div class="col-sm-9">
                <input type="text" class="form-control" formControlName="questionText" placeholder="Enter Question">
            </div>
        </div>
        
        <div class="row mb-3">
            <div class="col-sm-3 fw-bold text-end mt-2">Guideline:</div>
            <div class="col-sm-9">
                <!-- 3-Line Multiline TextBox via formControlName -->
                <textarea class="form-control" formControlName="guidelineText" rows="3" placeholder="Enter Guideline details..."></textarea>
            </div>
        </div>
    
        <div class="row mb-3 align-items-center">
            <div class="col-sm-3 fw-bold text-end">Settings:</div>
            <div class="col-sm-9" style="display: flex; gap: 20px;">
                <mat-checkbox formControlName="isMandatory">Mandatory</mat-checkbox>
                <mat-checkbox formControlName="isPriority">High Priority</mat-checkbox>
            </div>
        </div>
    </form>
 </div>
 
 <mat-dialog-actions align="end" style="padding: 15px;">
     <button mat-raised-button style="background-color: lightgray; color: red;" (click)="onCancel()">
         <mat-icon>cancel</mat-icon> Close
     </button>
     <button mat-raised-button color="primary" class="ms-2" [disabled]="!questionForm.valid" (click)="onSave()">
         <mat-icon>save</mat-icon> {{ isEditMode ? 'Update' : 'Save' }}
     </button>
 </mat-dialog-actions>
