<div class="NewHeader">
    <h3 style="padding: 15px; margin: 0; color: white; background-color: #283593; font-weight: 400; font-size: 24px;">
        {{ isEditMode ? 'Update Target' : 'Add Target' }}
    </h3>
</div>

<div mat-dialog-content style="padding: 20px;">
    <form [formGroup]="form">
        
        <div class="row mb-3 align-items-center">
            <div class="col-sm-4 fw-bold text-end">Year: <span class="text-danger">*</span></div>
            <div class="col-sm-8">
                <input type="number" class="form-control" formControlName="targetYear" placeholder="YYYY">
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <div class="col-sm-4 fw-bold text-end">Q1 Target: <span class="text-danger">*</span></div>
            <div class="col-sm-8">
                <input type="number" class="form-control" formControlName="q1" min="0" max="100" placeholder="0-100">
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <div class="col-sm-4 fw-bold text-end">Q2 Target: <span class="text-danger">*</span></div>
            <div class="col-sm-8">
                <input type="number" class="form-control" formControlName="q2" min="0" max="100" placeholder="0-100">
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <div class="col-sm-4 fw-bold text-end">Q3 Target: <span class="text-danger">*</span></div>
            <div class="col-sm-8">
                <input type="number" class="form-control" formControlName="q3" min="0" max="100" placeholder="0-100">
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <div class="col-sm-4 fw-bold text-end">Q4 Target: <span class="text-danger">*</span></div>
            <div class="col-sm-8">
                <input type="number" class="form-control" formControlName="q4" min="0" max="100" placeholder="0-100">
            </div>
        </div>

    </form>
</div>

<mat-dialog-actions align="end" style="padding: 15px;">
    <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()" style="background-color: lightgray; color: red; margin-right: 5px;">
        <mat-icon>cancel</mat-icon> Close
    </button>
    <button mat-raised-button type="submit" class="save" color="primary" [disabled]="!form.valid" (click)="save()">
        <mat-icon>save</mat-icon> {{ isEditMode ? 'Update' : 'Save' }}
    </button>
</mat-dialog-actions>
