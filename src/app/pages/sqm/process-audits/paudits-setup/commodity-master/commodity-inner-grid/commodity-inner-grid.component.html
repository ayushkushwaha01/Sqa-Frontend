<div style="width: 100%; box-sizing: border-box; padding: 15px; background-color: #f8f9fa;">

  <div style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 15px;">
    <button mat-raised-button class="mat-focus-indicator mat-raised-button mat-button-base" style="background-color: #808080; color: white; margin-right: 10px;" (click)="goBack()">
        <span class="mat-button-wrapper">
          <mat-icon role="img" class="mat-icon notranslate material-icons mat-icon-no-color" aria-hidden="true" data-mat-icon-type="font">arrow_back</mat-icon> Back 
        </span>
    </button>

    <button mat-raised-button style="background-color: #2196f3; color: white; padding: 10px 16px; height: 35px; border: none; border-radius: 4px; display: flex; align-items: center; gap: 6px; font-weight: 500; cursor: pointer;" (click)="ontarget(null)">
        <mat-icon class="mt-1" style="font-size: 18px; height: 18px; width: 18px;">add</mat-icon>
        Add Target
    </button>
  </div>

  <div class="content-layout" style="display: flex; gap: 20px;">
    
    <div class="sidebar-menu" style="display: flex; flex-direction: column; gap: 10px; width: 200px;">
      <button mat-raised-button [ngClass]="{'active-tab': activeTab === 'process', 'inactive-tab': activeTab !== 'process'}" (click)="setTab('process')" style="width: 100%; padding: 10px;">
        Process Audits
      </button>

      <button mat-raised-button [ngClass]="{'active-tab': activeTab === 'parts', 'inactive-tab': activeTab !== 'parts'}" (click)="setTab('parts')" style="width: 100%; padding: 10px;">
        Parts Audits
      </button>
    </div>

    <div class="grid-container" style="flex-grow: 1;">
      <table class="custom-grid-table">
        <thead>
          <tr style="background-color: black; color: white;">
            <th style="padding: 10px;">Year</th>
            <th style="padding: 10px;">Q1</th>
            <th style="padding: 10px;">Q2</th>
            <th style="padding: 10px;">Q3</th>
            <th style="padding: 10px;">Q4</th>
            <th class="text-center" style="padding: 10px;">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of currentGridData" style="border-bottom: 1px solid #ddd; background: white;">
            <td style="padding: 10px;">{{ row.targetYear }}</td>
            <td style="padding: 10px;">{{ row.q1 }}</td>
            <td style="padding: 10px;">{{ row.q2 }}</td>
            <td style="padding: 10px;">{{ row.q3 }}</td>
            <td style="padding: 10px;">{{ row.q4 }}</td>
            <td class="action-cell text-center" style="padding: 10px;"> 
              <mat-icon class="edit-icon" matTooltip="Edit" (click)="ontarget(row)" style="color: blue; padding-right: 10px; cursor: pointer;">edit</mat-icon> 
              <mat-icon class="delete-icon" matTooltip="Delete" (click)="deleteTarget(row)" style="color: red; padding: 5px; cursor: pointer;">delete</mat-icon>
            </td>
          </tr>
          <tr *ngIf="currentGridData.length === 0">
            <td colspan="6" class="text-center text-muted" style="padding: 15px; background: white;">No Targets Found for {{ activeTab | titlecase }} Audits</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
