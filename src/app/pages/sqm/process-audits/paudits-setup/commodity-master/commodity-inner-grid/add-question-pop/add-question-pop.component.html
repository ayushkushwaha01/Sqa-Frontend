<div style="background-color: #286ba5 ; color: #ffffff; padding: 10px; text-align: center; margin: -24px -24px 24px -24px;">
  <h2 style="margin: 0; font-size: 24px; font-weight: 400; font-family: Roboto, sans-serif;">
    {{ isEditMode ? 'Update Question' : 'Add Question' }}
  </h2>
</div>

<div>
    <div fxLayout="row wrap" class="col-sm-12">
        <div class="col-sm-12" style="margin-top: 0px; padding-left: 10px; padding-right: 20px;">
            <form>
                <div>

                     <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5" style="margin-top:5px; font-weight: bold;">
                                Question  :</label>

                        </div>
                        <div class="col-sm-8">

                            <input type="text" class="form-control" placeholder="Enter Question">
                        </div>

                    </div>

                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5" style="margin-top:5px; font-weight: bold;">
                                Guideline :</label>

                        </div>
                        <div class="col-sm-8">

                            <input type="text" class="form-control" placeholder="Enter Guideline">
                        </div>

                    </div>







                </div>
            </form>


            <mat-dialog-actions align="end"
                style="margin-top: 15px; display: flex; justify-content: flex-end;margin-right: -20px;">
                <button mat-raised-button class="ms-2 add-dark-hover btn-default"  
                    style="background-color: lightgray; color: red;margin-right: 5px;">
                    <mat-icon>cancel</mat-icon> Close
                </button>
                <button mat-raised-button type="submit" class="save" color="primary" style="margin-right: 17px;">
                    <mat-icon>save</mat-icon>
                    {{ isEditMode ? 'Update' : 'Save' }}
                </button>
            </mat-dialog-actions>



        </div>
    </div>
</div>
