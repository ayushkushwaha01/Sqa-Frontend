<div class="NewHeader">
    <h2 style="padding-top:0px; padding-left: 20px; font-weight: 400;font-size: 18px;">
        <span *ngIf="!data">Add</span><span *ngIf="data">Edit</span> Active Audit
    </h2>
</div>

<div style="padding: 10px 20px;">
    <form [formGroup]="form">
        
        <!-- Commodity -->
        <div class="row" style="margin-bottom: 12px;">
            <div class="col-sm-4"><label style="font-weight: bold;">Commodity <span class="text-danger">*</span></label></div>
            <div class="col-sm-8">
                <mat-select formControlName="commodityId" placeholder="Select Commodity" class="form-control">
                    <mat-option *ngFor="let c of commodities" [value]="c.commodityId">{{c.name}}</mat-option>
                </mat-select>
            </div>
        </div>

        <!-- Supplier -->
        <div class="row" style="margin-bottom: 12px;">
            <div class="col-sm-4"><label style="font-weight: bold;">Supplier <span class="text-danger">*</span></label></div>
            <div class="col-sm-8">
                <mat-select formControlName="supplierId" placeholder="Select Supplier" class="form-control">
                    <mat-option *ngFor="let s of suppliers" [value]="s.supplierId">{{s.supplierName}}</mat-option>
                </mat-select>
            </div>
        </div>

        <!-- State -->
        <div class="row" style="margin-bottom: 12px;">
            <div class="col-sm-4"><label style="font-weight: bold;">State <span class="text-danger">*</span></label></div>
            <div class="col-sm-8">
                <mat-select formControlName="stateId" placeholder="Select State" class="form-control" (selectionChange)="onStateChange($event.value)">
                    <mat-option *ngFor="let s of states" [value]="s.stateId">{{s.stateName}}</mat-option>
                </mat-select>
            </div>
        </div>

        <!-- City -->
        <div class="row" style="margin-bottom: 12px;">
            <div class="col-sm-4"><label style="font-weight: bold;">City <span class="text-danger">*</span></label></div>
            <div class="col-sm-8">
                <mat-select formControlName="cityId" placeholder="Select City" class="form-control">
                    <mat-option *ngFor="let c of filteredCities" [value]="c.cityId">{{c.cityName}}</mat-option>
                </mat-select>
            </div>
        </div>

        <!-- Auditor -->
        <div class="row" style="margin-bottom: 12px;">
            <div class="col-sm-4"><label style="font-weight: bold;">Auditor <span class="text-danger">*</span></label></div>
            <div class="col-sm-8">
                <mat-select formControlName="auditorId" placeholder="Select Auditor" class="form-control">
                    <mat-option *ngFor="let a of auditors" [value]="a.userId">{{a.userName}}</mat-option>
                </mat-select>
            </div>
        </div>

        <!-- Date -->
        <div class="row" style="margin-bottom: 12px;">
            <div class="col-sm-4"><label style="font-weight: bold;">Audit Date <span class="text-danger">*</span></label></div>
            <div class="col-sm-8">
                <div style="display: flex; align-items: center; border: 1px solid #ced4da; border-radius: 4px; height: 38px; background-color: white; overflow: hidden;">
                    <input matInput [matDatepicker]="picker" formControlName="auditDate" placeholder="mm/dd/yyyy"
                        style="border: none; outline: none; flex: 1; padding-left: 12px; height: 100%; font-size: 14px; background: transparent;">
                    <mat-datepicker-toggle matSuffix [for]="picker" style="flex-shrink: 0;"></mat-datepicker-toggle>
                    <mat-datepicker #picker></mat-datepicker>
                </div>
            </div>
        </div>

        <!-- Remarks -->
        <div class="row" style="margin-bottom: 25px;">
            <div class="col-sm-4"><label style="font-weight: bold;">Remarks <span class="text-danger">*</span></label></div>
            <div class="col-sm-8">
                <textarea formControlName="remarks" class="form-control" rows="3" placeholder="Enter remarks..."></textarea>
            </div>
        </div>
    </form>

    <mat-dialog-actions align="end">
        <button mat-raised-button (click)="close()" style="background-color: lightgray; color: red; margin-right: 10px;">
            <mat-icon>cancel</mat-icon> Close
        </button>
        <button mat-raised-button color="primary" [disabled]="!form.valid" (click)="save()">
            <mat-icon>save</mat-icon> Save
        </button>
    </mat-dialog-actions>
</div>
