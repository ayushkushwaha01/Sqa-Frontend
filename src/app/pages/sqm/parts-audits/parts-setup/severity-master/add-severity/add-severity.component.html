<div class="NewHeader">
    <h3 style="padding-top:0px; padding-left: 20px; font-weight: 400;font-size: 18px;">
        {{ isEditMode ? 'Edit Severity' : 'Add Severity' }}
    </h3>
</div>

<div>
    <div fxLayout="row wrap" class="col-sm-12">
        <div class="col-sm-12" style="margin-top: 0px; padding-left: 10px; padding-right: 20px;">
            
            <form [formGroup]="severityForm" (ngSubmit)="save()">
                <div>
                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5" style="margin-top:5px; font-weight: bold;">
                                Severity Name :
                            </label>
                        </div>
                        <div class="col-sm-8">
                            <input type="text" formControlName="severityName" class="form-control" placeholder="Enter Severity Name">
                             <div *ngIf="severityForm.get('severityName')?.hasError('required') && severityForm.get('severityName')?.touched" 
                                 style="color: red; font-size: 12px; margin-top: 4px;">
                                Severity Name is required
                            </div>
                        </div>
                    </div>

                    <div class="row" style="margin-bottom: 12px;">
                        <div class="col-sm-4">
                            <label class="add-member-label mt5" style="margin-top:5px; font-weight: bold;">
                                Rating (1-10) :
                            </label>
                        </div>
                        <div class="col-sm-8">
                            <input type="number" formControlName="rating" class="form-control" placeholder="Enter Rating (1-10)" min="1" max="10">
                             <div *ngIf="severityForm.get('rating')?.hasError('required') && severityForm.get('rating')?.touched" 
                                 style="color: red; font-size: 12px; margin-top: 4px;">
                                Rating is required
                            </div>
                            <div *ngIf="(severityForm.get('rating')?.hasError('min') || severityForm.get('rating')?.hasError('max')) && severityForm.get('rating')?.touched" 
                                 style="color: red; font-size: 12px; margin-top: 4px;">
                                Rating must be between 1 and 10
                            </div>
                        </div>
                    </div>
                </div>

                <mat-dialog-actions align="end" style="margin-top: 15px; display: flex; justify-content: flex-end;margin-right: -20px;">
                    
                    <button mat-raised-button class="ms-2 add-dark-hover btn-default" type="button" (click)="close()"
                        style="background-color: lightgray; color: red;margin-right: 5px;">
                        <mat-icon>cancel</mat-icon> Close
                    </button>
                    
                    <button mat-raised-button type="submit" class="save" color="primary" style="margin-right: 17px;" [disabled]="severityForm.invalid">
                        <mat-icon>save</mat-icon>
                        {{ isEditMode ? 'Update' : 'Save' }}
                    </button>
                    
                </mat-dialog-actions>
            </form>

        </div>
    </div>
</div>
