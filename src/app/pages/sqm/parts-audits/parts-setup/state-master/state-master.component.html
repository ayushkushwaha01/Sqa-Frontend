<div class="custom-layout-wrapper">

    <div class="toolbar-row mb-3 d-flex justify-content-end" style="width: 100%;">
        <button mat-raised-button
            style="background-color: #1a1a1a; color: white; padding: 10px 16px; height: 40px; border: none; border-radius: 4px; display: flex; align-items: center; gap: 6px; font-weight: 500; cursor: pointer;"
            (click)="toggleFilters()">
            <mat-icon style="font-size: 18px; height: 18px; width: 18px; margin-top:4px">filter_list</mat-icon>
            Filter
        </button>
        &nbsp;&nbsp;&nbsp;&nbsp;
        <button mat-raised-button color="primary" class="btn-blue" (click)="addState(null)">
            <mat-icon>add</mat-icon> Add State
        </button>
    </div>

    <div fxLayout="row wrap" *ngIf="showFilters" class=" mb-3">
        <div fxFlex="100" class="flex w-100">
            <form [formGroup]="filterForm">
                <mat-card class="filter">
                    <mat-card-content>
                        <div class="row col-sm-12">

                            <div class="col-sm-4 row me-2">
                                <div class="col-sm-3 d-flex align-items-center"><b>Keyword:</b></div>
                                <div class="col-sm-9">
                                    <input type="text" formControlName="keyword" class="form-control"
                                        placeholder="Search by State Name...">
                                </div>
                            </div>

                            <div class="col-sm-4 row me-2">
                                <div class="col-sm-3 d-flex align-items-center"><b>Status:</b></div>
                                <div class="col-sm-8">
                                    <mat-select formControlName="status" placeholder="Select Status"
                                        class="form-control">
                                        <mat-option *ngFor="let option of Status" [value]="option.value">
                                            {{option.name}}
                                        </mat-option>
                                    </mat-select>
                                </div>
                            </div>

                            <div class="col-sm-4">
                                <button mat-raised-button color="primary" class="pull-right" (click)="applyFilter()">
                                    <mat-icon>search</mat-icon> Search
                                </button>
                                <button mat-raised-button class="pull-right btn-default margin-right-10"
                                    (click)="clearFilter()">
                                    <mat-icon>settings_backup_restore</mat-icon> Clear
                                </button>
                            </div>

                        </div>
                    </mat-card-content>
                </mat-card>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-hover" style="width: 100%;">
            <thead class="tbl-head">
                <tr>
                    <th>State Name</th>
                    <th class="text-center">Status</th>
                    <th class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of filteredStates">

                    <td>{{ item.stateName }}</td>

                    <td class="text-center">
                        <span style="cursor: pointer;" (click)="toggleStatus(item)" [ngStyle]="{
                            'color': item.isActive ? 'green' : 'red',
                            'font-weight': '500'
                        }">
                            {{ item.isActive ? 'Active' : 'Inactive' }}
                        </span>
                    </td>

                    <td class="text-center">
                        <a matTooltip="Edit Record" style="margin-right: 12px; cursor: pointer;"
                            (click)="addState(item)">
                            <mat-icon style="color: cornflowerblue; font-size: 20px;">edit</mat-icon>
                        </a>

                        <a matTooltip="Delete Record" style="cursor: pointer;" (click)="deleteState(item)">
                            <mat-icon style="color: red; font-size: 20px;">delete</mat-icon>
                        </a>
                    </td>

                </tr>

                <tr *ngIf="!filteredStates || filteredStates.length === 0">
                    <td colspan="3" class="text-center">No records found</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
