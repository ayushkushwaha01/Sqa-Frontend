<div class="NewHeader"
    style="background-color: #f5f5f5; padding: 10px 20px; border-bottom: 1px solid #ddd; margin-bottom: 20px;">
    <h1 *ngIf="!data" style="margin: 0; font-weight: 400;font-weight: 18px;">Add Batch Record</h1>
    <h3 *ngIf="data" style="margin: 0; font-weight: 400;font-weight: 18px;">Edit Batch Record</h3>
</div>

<div>
    <div fxLayout="row wrap" class="col-sm-12">
        <div class="col-sm-12" style="padding: 0 20px 0 10px;">

            <form>

                <div class="row" style="margin-bottom: 12px;">
                    <div class="col-sm-4">
                        <label class="add-member-label mt-2" style="font-weight: bold;">
                            Part Family
                        </label>
                    </div>
                    <div class="col-sm-8">
                        <mat-select placeholder="Select Part Family Name" class="form-control mt-2">
                            <mat-option value="family1">Engine Components</mat-option>
                            <mat-option value="family2">Braking Systems</mat-option>
                            <mat-option value="family3">Electrical Systems</mat-option>
                        </mat-select>
                    </div>
                </div>

                <div class="row" style="margin-bottom: 12px;">
                    <div class="col-sm-4">
                        <label class="add-member-label mt-2" style="font-weight: bold;">
                            Select Part Number
                        </label>
                    </div>
                    <div class="col-sm-8">
                        <mat-select placeholder="Select Part Number" class="form-control mt-2">
                            <mat-option value="part1">Part 1</mat-option>
                            <mat-option value="part2">Part 2</mat-option>
                            <mat-option value="part3">Part 3</mat-option>
                        </mat-select>
                    </div>
                </div>

                <div class="row" style="margin-bottom: 12px;">
                    <div class="col-sm-4">
                        <label class="add-member-label mt-2" style="font-weight: bold;">
                            Batch Number
                        </label>
                    </div>
                    <div class="col-sm-8">
                        <input type="text" class="form-control mt-2" placeholder="Enter Batch Number">
                    </div>
                </div>




                <div class="row" style="margin-bottom: 12px;">
                    <div class="col-sm-4">
                        <label class="add-member-label mt-2" style="font-weight: bold;">
                            Batch Date
                        </label>
                    </div>
                    <div class="col-sm-8">
                        <input type="date" class="form-control mt-2" placeholder="Enter Batch Date">
                    </div>
                </div>

                <!-- <div class="row" style="margin-bottom: 12px;">
                    <div class="col-sm-4">
                        <label class="add-member-label mt-2" style="font-weight: bold;">
                            Batch Date
                        </label>
                    </div>
                    <div class="col-sm-8">
                        <mat-form-field appearance="outline" class="w-100">
                            <input matInput [matDatepicker]="picker" placeholder="Choose Batch Date">
                            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                            <mat-datepicker #picker></mat-datepicker>
                        </mat-form-field>
                    </div>
                </div> -->

                <div class="row" style="margin-bottom: 12px;">
                    <div class="col-sm-4">
                        <label class="add-member-label mt-2" style="font-weight: bold;">
                            Remarks
                        </label>
                    </div>
                    <div class="col-sm-8">
                        <input type="text" class="form-control mt-2" placeholder="Enter Remarks">
                    </div>
                </div>

                <mat-dialog-actions align="end" style="margin-top: 20px;">
                    <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()"
                        style="background-color: lightgray; color: red; margin-right: 10px;">
                        <mat-icon>cancel</mat-icon>
                        Cancel
                    </button>

                    <button mat-raised-button color="primary" type="submit" class="save" (click)="close()">
                        <mat-icon>save</mat-icon>
                        Save
                    </button>
                </mat-dialog-actions>

            </form>

        </div>
    </div>
</div>
