<div class="NewHeader" style="background-color: #f5f5f5; padding: 10px 20px; border-bottom: 1px solid #ddd; margin-bottom: 20px;">
    <h1 style="margin: 0; font-weight: 400; font-size: 18px;">
        <span *ngIf="!data">Add</span><span *ngIf="data">Edit</span> Defect
    </h1>
</div>

<div style="padding: 0 25px 15px 25px;">
    <form [formGroup]="form">
        <div class="row" style="margin-bottom: 12px;">
            <div class="col-sm-4">
                <label class="add-member-label mt-2" style="font-weight: bold;">
                    Defect Name  :
                </label>
            </div>
            <div class="col-sm-8">
                <input type="text" formControlName="defectName" class="form-control mt-2" placeholder="Enter Defect Name">
                <small class="text-danger" *ngIf="form.controls['defectName'].hasError('required') && form.controls['defectName'].touched">
                    Defect name is required
                </small>
            </div>
        </div>
    </form>

    <mat-dialog-actions align="end" style="margin-top: 20px;">
        <button mat-raised-button class="ms-2 add-dark-hover btn-default" (click)="close()" style="background-color: lightgray; color: red; margin-right: 10px;">
            <mat-icon>cancel</mat-icon> Cancel
        </button>
        <button mat-raised-button color="primary" [disabled]="!form.valid" (click)="save()">
            <mat-icon>save</mat-icon> Save
        </button>
    </mat-dialog-actions>
</div>
