<div class="col-sm-12 mt-4 text-right pr-0" style="width:70%">
    <button mat-raised-button style="background-color: black; color: white;" class="margin-right-10" (click)="filterToggle = !filterToggle">
        <mat-icon>filter_list</mat-icon> Filter
    </button>
    <button [ngClass]="{'disable-custom' : !canCreate}" mat-raised-button color="primary" (click)="addmodule(null)">
        <mat-icon>add</mat-icon> Add Department
    </button>
</div>

<div class="col-sm-12 mt-3" *ngIf="filterToggle" style="width:70%">
    <mat-card class="filter">
        <mat-card-content>
            <form>
                <div class="row align-items-center mb-3">
                    <div class="col-md-4 d-flex align-items-center">
                        <label class="mb-0 mr-2" style="white-space: nowrap; font-weight: bold;">Keyword :&nbsp;</label>
                        <input type="text" class="form-control" placeholder="Enter Keyword" [(ngModel)]="filterKeyword" name="keyword">
                    </div>
                    
                    <div class="col-md-4 d-flex align-items-center">
                        <label class="mb-0 mr-2" style="white-space: nowrap; font-weight: bold;">Status :&nbsp;</label>
                        <mat-select class="form-control" placeholder="Select Status" [(ngModel)]="filterStatus" name="status">
                            <mat-option [value]="null">All</mat-option>
                            <mat-option [value]="true">Active</mat-option>
                            <mat-option [value]="false">Inactive</mat-option>
                        </mat-select>
                    </div>

                    <div class="col-md-4 d-flex align-items-center">
                        <label class="mb-0 mr-2" style="white-space: nowrap; font-weight: bold;">Department Code :&nbsp;</label>
                        <mat-select class="form-control" placeholder="Select Dept Code" multiple [(ngModel)]="filterDeptCodes" name="deptCode">
                            <mat-option *ngFor="let code of uniqueDeptCodes" [value]="code">{{code}}</mat-option>
                        </mat-select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-sm-12 text-right">
                        <button mat-raised-button color="primary" class="margin-right-10" (click)="applyFilters()">
                            <mat-icon>search</mat-icon> Search
                        </button>
                        <button mat-raised-button class="btn-default margin-right-10" (click)="clearFilters()">
                            <mat-icon>settings_backup_restore</mat-icon> Clear
                        </button>
                        <a (click)="filterToggle = !filterToggle" style="font-size: 25px; cursor: pointer; vertical-align: middle;">
                            <i class="fa fa-angle-double-up" aria-hidden="true"></i>
                        </a>
                    </div>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>

<div class="col-sm-12 mt-4" style="width:70%">
    <div id="grid-table-container" class="table-responsive">
        <table matSort id="example2" class="table table-bordered table-hover">
            <thead class="tbl-head">
                <tr>
                    <th>Department Name</th>
                    <th>Department Code</th>
                    <th>Department Head</th>
                    <th class="text-center">Status</th>
                    <th class="text-center" style="width: 112px!important;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of tableList">
                    <td>{{item.departmentName}}</td>
                    <td>{{item.departmentCode}}</td>
                    <td>{{item.departmentHead}}</td>
                    <td class="text-center" style="text-align: center !important;">
                        <a [ngStyle]="{'color': item.isActive ? 'blue' : 'red', 'cursor':'pointer'}" [ngClass]="{'disable-custom' : !canUpdate}">
                            <span *ngIf="!item.isActive" (click)="Confirmation(item)">Inactive</span>
                            <span *ngIf="item.isActive" (click)="Confirmation(item)">Active</span>
                        </a>
                    </td>
                    <td class="text-center editDel">
                        <a [ngClass]="{'disable-custom' : !canUpdate}" style="cursor: pointer;margin-right:10px;" matTooltip="Edit" (click)="addmodule(item)">
                            <i class="fa fa-edit" style="color: cornflowerblue"></i>
                        </a>
                        <a [ngClass]="{'disable-custom' : !canDelete}">
                            <i class="fa fa-trash red" matTooltip="Delete" style="cursor: pointer;" (click)="deleteConfirmation(item)"></i>
                        </a>
                    </td>
                </tr>
                <tr *ngIf="!tableList || tableList.length == 0">
                    <td colspan="5" class="text-center">No data available</td>
                </tr>
            </tbody>
        </table>
        
        <mat-paginator class="col-sm-12" 
            [length]="totalSize" 
            [pageIndex]="currentPage" 
            [pageSize]="pageSize"
            [pageSizeOptions]="[5, 10, 20, 50, 100]" 
            showFirstLastButtons
            (page)="handlePage($event)">
        </mat-paginator>
    </div>
</div>
